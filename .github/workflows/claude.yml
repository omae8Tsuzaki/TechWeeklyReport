name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # @claudeメンションに応答するジョブ
  claude-response:
    if: github.actor == 'omae8Tsuzaki'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # 許可ユーザー以外のジョブを早期終了
      - name: Check allowed users
        id: check-user
        run: |
          ACTOR="${{ github.actor }}"
          ALLOWED="omae8Tsuzaki"
          if echo "$ALLOWED" | grep -w "$ACTOR" > /dev/null; then
            echo "allowed=true" >> $GITHUB_OUTPUT
          else
            echo "allowed=false" >> $GITHUB_OUTPUT
            echo "::notice::User $ACTOR is not allowed to trigger Claude."
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          model: "sonnet" # モデルの指定